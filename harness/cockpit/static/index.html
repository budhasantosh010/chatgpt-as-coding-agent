<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harness Workbench</title>
<script>
document.documentElement.dataset.theme = localStorage.getItem("cockpit-theme") || "light";
</script>
<!--BOOT-->
<link rel="stylesheet" href="/static/cockpit.css?v=13">
</head>
<body>
<header class="titlebar">
  <div class="brand"><span class="brand-mark" aria-hidden="true">H</span><span>Harness</span></div>
  <div class="titlebar-actions">
    <button class="status-button is-hidden" id="needsPill" type="button"><span id="needsCount">0</span> need you</button>
    <span class="engine-status" id="engineStatus"><span class="status-dot"></span><span id="engineText">Connecting</span></span>
    <button class="icon-button" id="sidebarToggle" type="button" aria-label="Toggle project navigation" aria-controls="primarySidebar" aria-expanded="true">Projects</button>
    <button class="icon-button" id="inspectorToggle" type="button" aria-label="Toggle inspector" aria-controls="inspector" aria-expanded="true">Panel</button>
    <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle color theme">Theme</button>
    <button class="quiet-button" id="restart" type="button">Restart engine</button>
  </div>
</header>

<div class="workbench" id="workbench">
  <aside class="primary-sidebar" id="primarySidebar" aria-label="Projects and sessions">
    <div class="sidebar-actions">
      <button class="new-session-button" id="newSession" type="button"><span aria-hidden="true">+</span> New session</button>
      <button class="icon-button" id="addProjectTop" type="button" aria-label="Add project">+</button>
      <button class="icon-button" id="sidebarClose" type="button" aria-label="Close navigation">x</button>
    </div>
    <label class="search-box">
      <span class="sr-only">Search projects and sessions</span>
      <input id="sidebarSearch" type="search" placeholder="Search" autocomplete="off">
      <kbd>Ctrl K</kbd>
    </label>
    <div class="sidebar-scroll" id="tree"></div>
    <div class="sidebar-footer">
      <button class="quiet-button fill" id="addProject" type="button">Add project folder</button>
    </div>
  </aside>

  <button class="nav-backdrop" id="navBackdrop" type="button" aria-label="Close navigation"></button>

  <div class="resize-handle resize-handle-left" id="leftResizeHandle" role="separator" aria-label="Resize project sidebar" aria-orientation="vertical" aria-valuemin="220" aria-valuemax="480" tabindex="0"></div>

  <section class="center-pane" aria-label="Session workspace">
    <nav class="session-tabs" id="sessionTabs" role="tablist" aria-label="Open sessions"></nav>
    <main class="workspace" id="workspace" tabindex="-1"></main>
  </section>

  <div class="resize-handle resize-handle-right" id="rightResizeHandle" role="separator" aria-label="Resize inspector" aria-orientation="vertical" aria-valuemin="320" aria-valuemax="720" tabindex="0"></div>

  <aside class="inspector" id="inspector" aria-label="Session inspector">
    <nav class="inspector-tabs" id="inspectorTabs" role="tablist" aria-label="Inspector views"></nav>
    <div class="inspector-body" id="inspectorBody"></div>
  </aside>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<dialog id="newTaskDlg" aria-labelledby="newTaskTitle">
  <form method="dialog">
    <h2 id="newTaskTitle">New session</h2>
    <p class="dialog-subtitle" id="ntProjName">Choose a project</p>
    <label class="field">Goal
      <input id="ntGoal" placeholder="What should we work on?" autofocus>
    </label>
    <label class="field">Permission mode
      <select id="ntMode">
        <option value="auto_workspace">Auto workspace - edit and test</option>
        <option value="build_ask">Build ask - approve changes</option>
        <option value="plan">Plan - read only planning</option>
        <option value="read_only">Read only</option>
      </select>
    </label>
    <div class="dialog-actions">
      <button value="cancel" class="quiet-button">Cancel</button>
      <button id="ntCreate" value="ok" class="primary-button">Create session</button>
    </div>
  </form>
</dialog>

<script type="module" src="/static/app.mjs?v=13"></script>
</body>
</html>
