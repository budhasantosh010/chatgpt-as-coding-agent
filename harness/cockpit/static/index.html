<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harness Cockpit</title>
<!--BOOT-->
<link rel="stylesheet" href="/static/cockpit.css?v=3">
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="logo">◆</span> Harness <span class="dim">Cockpit</span></div>
  <div class="topbar-right">
    <button class="needs-pill hidden" id="needsPill">⏸ <span id="needsCount">0</span> need you</button>
    <span class="engine-status" id="engineStatus"><span class="dot"></span> <span id="engineText">connecting…</span></span>
    <button class="btn ghost sm" id="restart">Restart engine</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head"><span>Projects</span>
      <button class="icon-btn" id="addProjectTop" title="Add a project folder">＋</button></div>
    <nav class="tree" id="tree"></nav>
    <div class="sidebar-foot">
      <button class="btn subtle block" id="addProject">＋ Add project</button>
    </div>
  </aside>

  <main class="workspace" id="workspace">
    <div class="ws-empty" id="wsEmpty">
      <div>
        <div class="big">◆</div>
        <h2>Pick a session to get started</h2>
        <div>Choose a project on the left, or create one, then start a session under it.</div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<dialog id="newTaskDlg">
  <form method="dialog">
    <h3>New session</h3>
    <div class="sub" id="ntProjName">in this project</div>
    <div class="field"><label>Goal</label>
      <input id="ntGoal" placeholder="e.g. build the login page" autofocus></div>
    <div class="field"><label>Permission mode</label>
      <select id="ntMode">
        <option value="auto_workspace">auto_workspace — edit &amp; run freely</option>
        <option value="build_ask">build_ask — ask before each change</option>
        <option value="plan">plan — read-only planning</option>
        <option value="read_only">read_only — look, don't touch</option>
      </select></div>
    <div class="dialog-row">
      <button value="cancel" class="btn ghost">Cancel</button>
      <button id="ntCreate" value="ok" class="btn">Create session</button>
    </div>
  </form>
</dialog>

<script src="/static/cockpit.js?v=3"></script>
</body>
</html>
