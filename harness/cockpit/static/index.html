<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harness Cockpit</title>
<!--BOOT-->
<link rel="stylesheet" href="/static/cockpit.css">
</head>
<body>
<header>
  <div class="brand">⛭ HARNESS COCKPIT <span class="sub">operator console · localhost only</span></div>
  <div class="engine">
    engine: <b id="engine">…</b>
    <button id="restart" class="btn small warn" title="Restart the engine (interrupts running tasks)">⟳ restart</button>
  </div>
</header>

<main>
  <!-- Column 1: projects -->
  <section class="col projects">
    <div class="col-head">
      <span>PROJECTS</span>
      <button id="addProject" class="btn small">+ Add</button>
    </div>
    <ul id="projectList" class="list"></ul>
    <div class="hint">Drop files onto a project's files panel to attach them.</div>
  </section>

  <!-- Column 2: sessions (tasks) under the selected project -->
  <section class="col sessions">
    <div class="col-head">
      <span>SESSIONS <small id="projName"></small></span>
      <button id="newTask" class="btn small" disabled>+ New</button>
    </div>
    <ul id="taskList" class="list"></ul>
  </section>

  <!-- Column 3: detail of the selected task -->
  <section class="col detail">
    <div class="col-head"><span>SESSION DETAIL</span></div>
    <div id="detail" class="detail-body"><div class="empty">Select a session.</div></div>
  </section>

  <!-- Column 4: live activity + approvals -->
  <section class="col activity">
    <div class="col-head"><span>⚡ LIVE ACTIVITY</span>
      <button id="clearFeed" class="btn small ghost">clear</button></div>
    <ul id="feed" class="feed"></ul>
    <div class="col-head"><span>⏸ NEEDS YOU</span></div>
    <ul id="approvals" class="list approvals"></ul>
  </section>
</main>

<!-- File-drop overlay + folder-picker dialogs are created dynamically -->
<div id="toast" class="toast"></div>
<dialog id="newTaskDlg">
  <form method="dialog">
    <h3>New session</h3>
    <label>Goal <input id="ntGoal" placeholder="e.g. build the login page" autofocus></label>
    <label>Mode
      <select id="ntMode">
        <option value="auto_workspace">auto_workspace</option>
        <option value="build_ask">build_ask</option>
        <option value="plan">plan</option>
        <option value="read_only">read_only</option>
      </select>
    </label>
    <div class="row">
      <button value="cancel" class="btn ghost">Cancel</button>
      <button id="ntCreate" value="ok" class="btn">Create</button>
    </div>
  </form>
</dialog>

<script src="/static/cockpit.js"></script>
</body>
</html>
